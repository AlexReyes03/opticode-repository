# ============================================================
# nginx.docker.conf — Nginx dentro de Docker
# Este archivo va montado en el contenedor nginx.
# A diferencia de nginx.conf (para instalación manual),
# aquí el upstream apunta al servicio "web" de Docker Compose.
# ============================================================

upstream django {
    server web:8000;   # "web" es el nombre del servicio en docker-compose.yml
}

server {
    listen 80;
    server_name _;     # acepta cualquier host (IP o dominio)

    client_max_body_size 55M;

    # Archivos estáticos (volumen compartido con el contenedor web)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos de media subidos por usuarios
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # Todo lo demás va a Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
