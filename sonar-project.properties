# Análisis monorepo desde la raíz del repo (uso recomendado con Docker:
# montar este directorio en /usr/src y ejecutar sonarsource/sonar-scanner-cli sin -Dproject.settings).
sonar.projectKey=sonar-prueba
sonar.projectName=Opticode (Backend + Frontend)
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8
sonar.python.version=3.13

sonar.sources=opticode_backend,opticode_frontend/src
sonar.inclusions=**/*.py,**/*.js,**/*.jsx,**/*.css

sonar.exclusions=**/migrations/**,**/__pycache__/**,**/.pytest_cache/**,**/.mypy_cache/**,**/htmlcov/**,**/venv/**,**/.venv/**,**/env/**,**/.env,**/.env.*,**/*.pyc,**/node_modules/**,**/static/**,**/staticfiles/**,**/media/**,**/logs/**,**/*.egg-info/**,**/dist/**,**/build/**,**/coverage/**,**/.vite/**,**/storybook-static/**,**/*.min.js,**/*.min.css,**/package-lock.json

sonar.tests=opticode_backend
sonar.test.inclusions=**/tests/**/*.py,**/test_*.py
sonar.coverage.exclusions=**/*
